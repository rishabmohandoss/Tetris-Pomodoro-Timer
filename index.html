
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Castle — Pomodoro</title>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky-light: #a8d4e6;
      --sky-mid: #7bb8d4;
      --sky-deep: #4a90b8;
      --grass: #4a8c3f;
      --grass-light: #6aad5a;
      --cloud: rgba(255,255,255,0.85);
      --warm-beige: #f5ead8;
      --parchment: #ede0c4;
      --ink: #2c1f0e;
      --ink-light: #5a4030;
      --amber: #d4860a;
      --amber-light: #f0a820;
      --rust: #b04020;
      --panel-bg: rgba(245, 234, 216, 0.92);
      --panel-border: rgba(180, 140, 80, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--sky-light);
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
      transition: background 1.5s ease;
    }

    body.break-mode { background: #b8d9a0; }
    body.break-mode .sky-gradient { background: linear-gradient(180deg, #8fc47a 0%, #b8d9a0 60%, #5a8c3f 100%); }
    body.break-mode .horizon-line { background: linear-gradient(90deg, #5a9640, #78b856, #5a9640); }

    /* === SKY SCENE === */
    .sky-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .sky-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #5a9dc8 0%, #a8d4e6 55%, #c5e8a0 100%);
      transition: background 1.5s ease;
    }

    /* Animated clouds */
    .cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      opacity: 0.8;
      filter: blur(1px);
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }
    .cloud-1 { width: 180px; height: 50px; top: 12%; animation: drift1 60s linear infinite; }
    .cloud-1::before { width: 80px; height: 80px; top: -40px; left: 20px; }
    .cloud-1::after { width: 60px; height: 60px; top: -30px; left: 80px; }

    .cloud-2 { width: 240px; height: 60px; top: 22%; opacity: 0.65; animation: drift2 80s linear infinite; animation-delay: -20s; }
    .cloud-2::before { width: 100px; height: 100px; top: -50px; left: 30px; }
    .cloud-2::after { width: 75px; height: 75px; top: -40px; left: 110px; }

    .cloud-3 { width: 140px; height: 40px; top: 8%; opacity: 0.7; animation: drift1 50s linear infinite; animation-delay: -35s; }
    .cloud-3::before { width: 60px; height: 60px; top: -30px; left: 15px; }
    .cloud-3::after { width: 50px; height: 50px; top: -25px; left: 65px; }

    .cloud-4 { width: 200px; height: 55px; top: 30%; opacity: 0.5; animation: drift2 70s linear infinite; animation-delay: -10s; }
    .cloud-4::before { width: 90px; height: 90px; top: -45px; left: 25px; }
    .cloud-4::after { width: 70px; height: 70px; top: -35px; left: 100px; }

    @keyframes drift1 {
      from { transform: translateX(-350px); }
      to   { transform: translateX(110vw); }
    }
    @keyframes drift2 {
      from { transform: translateX(110vw); }
      to   { transform: translateX(-350px); }
    }

    /* Rolling hills */
    .hills {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 35%;
    }
    .hill {
      position: absolute;
      border-radius: 50%;
      bottom: -10%;
    }
    .hill-1 { width: 70%; height: 200px; background: var(--grass); left: -10%; bottom: 0; }
    .hill-2 { width: 50%; height: 160px; background: var(--grass-light); right: -5%; bottom: 0; }
    .hill-3 { width: 35%; height: 120px; background: #5a9a50; left: 30%; bottom: 0; }
    .horizon-line {
      position: absolute;
      bottom: 60px;
      left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #3a7a30, #5aaa48, #3a7a30);
      opacity: 0.5;
    }

    /* === MAIN CONTENT === */
    .page {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 180px;
      min-height: 100vh;
    }

    .title-banner {
      font-family: 'IM Fell English', serif;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      color: var(--ink);
      text-align: center;
      letter-spacing: 0.05em;
      margin-bottom: 32px;
      text-shadow: 2px 2px 0 rgba(255,255,255,0.4);
      position: relative;
    }
    .title-banner::after {
      content: '';
      display: block;
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--amber), transparent);
      margin: 6px auto 0;
    }

    /* === TIMER PANEL === */
    .timer-panel {
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      border-radius: 16px;
      padding: 32px 40px 28px;
      box-shadow: 0 8px 32px rgba(60,40,10,0.18), 0 2px 0 rgba(255,255,255,0.5) inset;
      text-align: center;
      width: min(420px, 95vw);
      backdrop-filter: blur(4px);
      position: relative;
    }
    .timer-panel::before {
      content: '✦';
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--amber);
      color: white;
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      box-shadow: 0 2px 8px rgba(180,100,0,0.4);
    }

    .mode-label {
      font-family: 'IM Fell English', serif;
      font-size: 1.4rem;
      color: var(--ink-light);
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }
    .mode-label.break { color: #3a7a30; }

    .settings-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 16px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .input-group label {
      font-size: 0.78rem;
      color: var(--ink-light);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .input-group input {
      width: 64px;
      padding: 5px 8px;
      border: 1.5px solid var(--panel-border);
      border-radius: 8px;
      background: rgba(255,255,255,0.7);
      color: var(--ink);
      font-family: 'Crimson Pro', serif;
      font-size: 1.1rem;
      text-align: center;
      font-weight: 600;
    }
    .input-group input:focus { outline: none; border-color: var(--amber); }

    .timer-display {
      font-family: 'IM Fell English', serif;
      font-size: clamp(4.5rem, 14vw, 7rem);
      color: var(--ink);
      line-height: 1;
      letter-spacing: -0.02em;
      margin: 8px 0 20px;
      text-shadow: 3px 3px 0 rgba(180,120,40,0.15);
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 14px;
    }

    .btn {
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      font-weight: 600;
      padding: 9px 22px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: all 0.18s ease;
      box-shadow: 0 3px 0 rgba(0,0,0,0.18);
    }
    .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.18); }

    .btn-primary { background: var(--amber); color: white; }
    .btn-primary:hover { background: var(--amber-light); }

    .btn-secondary { background: rgba(255,255,255,0.7); color: var(--ink); border: 1.5px solid var(--panel-border); }
    .btn-secondary:hover { background: white; }

    .btn-skip { background: rgba(180,64,32,0.15); color: var(--rust); border: 1.5px solid rgba(180,64,32,0.3); }
    .btn-skip:hover { background: rgba(180,64,32,0.25); }

    .skip-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 6px;
    }

    /* === PROGRESS BAR === */
    .progress-track {
      width: 100%;
      height: 8px;
      background: rgba(180,140,80,0.2);
      border-radius: 4px;
      margin-top: 16px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--amber), var(--amber-light));
      border-radius: 4px;
      transition: width 1s linear;
      width: 100%;
    }
    body.break-mode .progress-fill { background: linear-gradient(90deg, #4a8c3f, #78c058); }

    /* === GAME PANEL === */
    .game-panel {
      margin-top: 28px;
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 32px rgba(60,40,10,0.18);
      backdrop-filter: blur(4px);
      text-align: center;
      width: min(860px, 95vw);
    }
    .game-panel-title {
      font-family: 'IM Fell English', serif;
      font-size: 1.1rem;
      color: var(--ink-light);
      margin-bottom: 8px;
      letter-spacing: 0.06em;
    }
    .game-hint {
      font-style: italic;
      font-size: 0.9rem;
      color: var(--amber);
      margin-bottom: 10px;
    }
    .game-panel iframe {
      border-radius: 10px;
      border: 2px solid var(--panel-border);
      display: block;
      margin: 0 auto;
    }

    /* Back-to-work banner */
    .back-to-work-banner {
      display: none;
      background: rgba(245,234,216,0.96);
      border: 2px solid var(--amber);
      border-radius: 12px;
      padding: 12px 20px;
      margin-bottom: 12px;
      color: var(--ink);
      font-family: 'IM Fell English', serif;
      font-size: 1.05rem;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 16px rgba(180,100,0,0.18);
    }
    .back-to-work-banner.visible { display: block; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Background sky scene -->
  <div class="sky-scene">
    <div class="sky-gradient"></div>
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="cloud cloud-4"></div>
    <div class="hills">
      <div class="hill hill-1"></div>
      <div class="hill hill-2"></div>
      <div class="hill hill-3"></div>
      <div class="horizon-line"></div>
    </div>
  </div>

  <!-- Page content -->
  <div class="page">
    <h1 class="title-banner">Study Castle</h1>

    <!-- Timer card -->
    <div class="timer-panel">
      <div class="mode-label" id="mode-text">Work Time</div>

      <div class="settings-row" id="settings">
        <div class="input-group">
          <label for="work-input">Work (min)</label>
          <input type="number" id="work-input" value="25" min="1">
        </div>
        <div class="input-group">
          <label for="break-input">Break (min)</label>
          <input type="number" id="break-input" value="5" min="1">
        </div>
      </div>

      <div class="timer-display" id="timer-display">25:00</div>

      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <div class="controls" style="margin-top:18px;">
        <button class="btn btn-primary" id="start-btn">Start</button>
        <button class="btn btn-secondary" id="pause-btn">Pause</button>
        <button class="btn btn-secondary" id="reset-btn">Reset</button>
      </div>

      <div class="skip-row">
        <button class="btn btn-skip" id="skip-btn">⏭ Skip Block</button>
      </div>
    </div>

    <!-- Game container (break time) -->
    <div id="game-container" class="game-panel hidden">
      <div class="back-to-work-banner" id="back-to-work-banner">
        ⏳ Break is over — finish your round, then head back to work!
      </div>
      <div class="game-panel-title">Break Time — Play Some Tetris!</div>
      <div class="game-hint">Controls inside the game below</div>
      <iframe src="tetris.html" frameborder="0" width="800" height="850" id="tetris-frame"></iframe>
    </div>
  </div>

  <script>
    let timerInterval;
    let totalSeconds;
    let timeLeft;
    let isWorkMode = true;
    let isRunning = false;
    let breakOverPending = false; // game still running after break ended

    const timerDisplay = document.getElementById('timer-display');
    const modeText = document.getElementById('mode-text');
    const workInput = document.getElementById('work-input');
    const breakInput = document.getElementById('break-input');
    const startBtn = document.getElementById('start-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const resetBtn = document.getElementById('reset-btn');
    const skipBtn = document.getElementById('skip-btn');
    const gameContainer = document.getElementById('game-container');
    const settingsContainer = document.getElementById('settings');
    const progressFill = document.getElementById('progress-fill');
    const backToWorkBanner = document.getElementById('back-to-work-banner');

    function init() {
      totalSeconds = workInput.value * 60;
      timeLeft = totalSeconds;
      updateDisplay();
      updateProgress();
    }

    function updateDisplay() {
      let m = Math.floor(timeLeft / 60);
      let s = timeLeft % 60;
      timerDisplay.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function updateProgress() {
      const pct = totalSeconds > 0 ? (timeLeft / totalSeconds) * 100 : 0;
      progressFill.style.width = pct + '%';
    }

    function startTimer() {
      if (isRunning) return;
      isRunning = true;
      timerInterval = setInterval(() => {
        if (timeLeft > 0) {
          timeLeft--;
          updateDisplay();
          updateProgress();
        } else {
          clearInterval(timerInterval);
          isRunning = false;
          switchMode();
        }
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timerInterval);
      isRunning = false;
    }

    function resetTimer() {
      clearInterval(timerInterval);
      isRunning = false;
      timeLeft = isWorkMode ? workInput.value * 60 : breakInput.value * 60;
      totalSeconds = timeLeft;
      updateDisplay();
      updateProgress();
    }

    function switchMode() {
      isWorkMode = !isWorkMode;
      const tetrisFrame = document.getElementById('tetris-frame');
      if (isWorkMode) {
        // Switching to work
        modeText.textContent = 'Work Time';
        modeText.classList.remove('break');
        totalSeconds = workInput.value * 60;
        timeLeft = totalSeconds;
        document.body.classList.remove('break-mode');
        settingsContainer.classList.remove('hidden');
        // Signal game that break is over — it keeps going until round ends
        try { tetrisFrame.contentWindow.postMessage('breakOver', '*'); } catch(e){}
        backToWorkBanner.classList.add('visible');
        skipBtn.textContent = '⏭ Skip Work Block';
      } else {
        // Switching to break — show game and start it
        modeText.textContent = 'Break Time!';
        modeText.classList.add('break');
        totalSeconds = breakInput.value * 60;
        timeLeft = totalSeconds;
        document.body.classList.add('break-mode');
        settingsContainer.classList.add('hidden');
        gameContainer.classList.remove('hidden');
        backToWorkBanner.classList.remove('visible');
        // Signal tetris to start (slight delay for iframe visibility)
        setTimeout(() => {
          try { tetrisFrame.contentWindow.postMessage('startGame', '*'); } catch(e){}
        }, 300);
        skipBtn.textContent = '⏭ Skip Break';
      }
      updateDisplay();
      updateProgress();
      startTimer();
    }

    function skipCurrentBlock() {
      clearInterval(timerInterval);
      isRunning = false;
      // switchMode() toggles isWorkMode internally, so just call it
      switchMode();
    }

    // Notify user after break ends if game is still open
    function notifyBreakOver() {
      backToWorkBanner.classList.add('visible');
    }

    startBtn.addEventListener('click', startTimer);
    pauseBtn.addEventListener('click', pauseTimer);
    resetBtn.addEventListener('click', resetTimer);
    skipBtn.addEventListener('click', skipCurrentBlock);

    workInput.addEventListener('change', () => {
      if (isWorkMode && !isRunning) {
        totalSeconds = workInput.value * 60;
        timeLeft = totalSeconds;
        updateDisplay();
        updateProgress();
      }
    });
    breakInput.addEventListener('change', () => {
      if (!isWorkMode && !isRunning) {
        totalSeconds = breakInput.value * 60;
        timeLeft = totalSeconds;
        updateDisplay();
        updateProgress();
      }
    });

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study with Snoopy — Pomodoro</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Handlee&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #fdf8f3;
      --warm-tan: #e8dcc8;
      --soft-brown: #a89080;
      --dark-brown: #5c4a42;
      --snoopy-black: #2b1f1a;
      --puppy-pink: #f4d4e6;
      --sky-blue: #b8d8e8;
      --soft-gold: #d4b896;
      --accent-warm: #d68a4a;
      --text-dark: #4a3a32;
      --panel-shadow: rgba(92, 74, 66, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-image: url('snoopy_lying_down_gif.gif');
      background-attachment: fixed;
      background-size: cover; 
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Subtle overlay to help contrast */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.1);
      z-index: 1;
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 180px;
      min-height: 100vh;
    }

    .title-banner {
      font-family: 'Handlee', cursive;
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      color: var(--snoopy-black);
      text-align: center;
      margin-bottom: 12px;
      text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.6);
      font-weight: 700;
    }

    /* === PANELS (40% Opacity) === */
    .timer-panel, .game-panel {
      background: linear-gradient(135deg, rgba(253, 248, 243, 0.4) 0%, rgba(232, 220, 200, 0.4) 100%);
      border: 3px solid var(--soft-brown);
      border-radius: 24px;
      box-shadow: 0 12px 48px var(--panel-shadow);
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      animation: slideUp 0.6s ease-out;
    }

    .timer-panel {
      padding: 40px 48px 32px;
      width: min(480px, 95vw);
    }

    .game-panel {
      margin-top: 36px;
      padding: 24px;
      width: min(920px, 95vw);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .audio-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .audio-row .btn {
      flex: 1;
      font-size: 0.75rem;
      padding: 10px 5px;
    }

    .timer-display {
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(5rem, 16vw, 8rem);
      color: var(--snoopy-black);
      font-weight: 700;
      margin: 10px 0;
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }

    .btn {
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary { background: var(--accent-warm); color: white; padding: 12px 25px; }
    .btn-secondary { background: rgba(255, 255, 255, 0.7); color: var(--dark-brown); border: 1px solid var(--soft-brown); padding: 12px 20px; }
    .btn-skip { background: rgba(244, 212, 230, 0.6); color: var(--dark-brown); border: 2px solid var(--puppy-pink); padding: 10px 20px; margin-top: 15px; }

    .settings-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 10px;
    }

    .input-group { display: flex; flex-direction: column; align-items: center; }
    .input-group label { font-size: 0.7rem; text-transform: uppercase; margin-bottom: 5px; color: var(--soft-brown); }
    .input-group input { width: 65px; padding: 5px; text-align: center; border-radius: 8px; border: 1px solid var(--soft-brown); background: rgba(255,255,255,0.5); }

    .progress-track { width: 100%; height: 8px; background: rgba(0,0,0,0.1); border-radius: 10px; margin: 15px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent-warm); width: 100%; transition: width 1s linear; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <audio id="rain-sound" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
  <audio id="fetty-sound" loop src="fetty.mp3"></audio>

  <div class="page">
    <h1 class="title-banner">Study with Snoopy</h1>

    <div class="timer-panel">
      <div class="audio-row">
        <button class="btn btn-secondary" id="rain-btn">🎵 Rain</button>
        <button class="btn btn-secondary" id="fetty-btn">🔥 Play Fetty</button>
      </div>

      <div class="mode-label" id="mode-text" style="font-family: Handlee; font-weight: bold; font-size: 1.4rem;">Work Time</div>

      <div class="settings-row" id="settings">
        <div class="input-group">
          <label>Work</label>
          <input type="number" id="work-input" value="25">
        </div>
        <div class="input-group">
          <label>Break</label>
          <input type="number" id="break-input" value="5">
        </div>
      </div>

      <div class="timer-display" id="timer-display">25:00</div>

      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="start-btn">Start</button>
        <button class="btn btn-secondary" id="pause-btn">Pause</button>
        <button class="btn btn-secondary" id="reset-btn">Reset</button>
      </div>

      <button class="btn btn-skip" id="skip-btn">⏭ Skip Block</button>
    </div>

    <div id="game-container" class="game-panel hidden">
      <h2 style="font-family: Handlee; margin-bottom: 10px;">Break Time!</h2>
      <iframe src="tetris.html" id="tetris-frame" frameborder="0" width="800" height="850"></iframe>
    </div>
  </div>

  <script>
    let timerInterval, totalSeconds, timeLeft, isWorkMode = true, isRunning = false;

    const display = document.getElementById('timer-display');
    const modeText = document.getElementById('mode-text');
    const workInput = document.getElementById('work-input');
    const breakInput = document.getElementById('break-input');
    const progressFill = document.getElementById('progress-fill');
    const gameContainer = document.getElementById('game-container');
    const settingsContainer = document.getElementById('settings');

    const rainSound = document.getElementById('rain-sound');
    const fettySound = document.getElementById('fetty-sound');
    const rainBtn = document.getElementById('rain-btn');
    const fettyBtn = document.getElementById('fetty-btn');

    function updateDisplay() {
      let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
      display.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      progressFill.style.width = (timeLeft / totalSeconds) * 100 + '%';
    }

    function startTimer() {
      if (isRunning) return;
      isRunning = true;
      timerInterval = setInterval(() => {
        if (timeLeft > 0) {
          timeLeft--;
          updateDisplay();
        } else {
          clearInterval(timerInterval);
          isRunning = false;
          switchMode();
        }
      }, 1000);
    }

    function switchMode() {
        isWorkMode = !isWorkMode;
        const tetrisFrame = document.getElementById('tetris-frame');
        
        if (isWorkMode) {
            modeText.textContent = 'Work Time';
            totalSeconds = workInput.value * 60;
            gameContainer.classList.add('hidden');
            settingsContainer.classList.remove('hidden');
            // Reset the game source so it's fresh for next time
            tetrisFrame.src = "tetris.html"; 
        } else {
            modeText.textContent = 'Break Time!';
            totalSeconds = breakInput.value * 60;
            gameContainer.classList.remove('hidden');
            settingsContainer.classList.add('hidden');
        }
        timeLeft = totalSeconds;
        updateDisplay();
        startTimer();
    }

    function toggleAudio(audio, btn, label) {
      if (audio.paused) {
        audio.play();
        btn.textContent = '⏸ ' + label;
        btn.style.background = 'var(--sky-blue)';
      } else {
        audio.pause();
        btn.textContent = '🎵 ' + label;
        btn.style.background = 'rgba(255, 255, 255, 0.7)';
      }
    }

    rainBtn.addEventListener('click', () => toggleAudio(rainSound, rainBtn, 'Rain'));
    fettyBtn.addEventListener('click', () => toggleAudio(fettySound, fettyBtn, 'Play Fetty'));

    document.getElementById('start-btn').addEventListener('click', startTimer);
    document.getElementById('pause-btn').addEventListener('click', () => { clearInterval(timerInterval); isRunning = false; });
    document.getElementById('reset-btn').addEventListener('click', () => {
      clearInterval(timerInterval); isRunning = false;
      timeLeft = isWorkMode ? workInput.value * 60 : breakInput.value * 60;
      totalSeconds = timeLeft;
      updateDisplay();
    });
    document.getElementById('skip-btn').addEventListener('click', switchMode);

    // Initial setup
    totalSeconds = workInput.value * 60;
    timeLeft = totalSeconds;
    updateDisplay();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study with Snoopy — Pomodoro</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Handlee&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #fdf8f3; --warm-tan: #e8dcc8; --soft-brown: #a89080;
      --dark-brown: #5c4a42; --snoopy-black: #2b1f1a; --puppy-pink: #f4d4e6;
      --sky-blue: #b8d8e8; --accent-warm: #d68a4a; --panel-shadow: rgba(92, 74, 66, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-image: url('snoopy_lying_down_gif.gif');
      background-attachment: fixed; background-size: cover; background-position: center;
    }

    .page { position: relative; z-index: 20; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; min-height: 100vh; }
    .title-banner { font-family: 'Handlee'; font-size: 3rem; color: var(--snoopy-black); margin-bottom: 12px; }

    /* 40% OPACITY PANELS */
    .timer-panel, .game-panel {
      background: linear-gradient(135deg, rgba(253, 248, 243, 0.4) 0%, rgba(232, 220, 200, 0.4) 100%);
      border: 3px solid var(--soft-brown); border-radius: 24px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 12px 48px var(--panel-shadow); text-align: center;
    }

    .timer-panel { padding: 40px; width: 480px; }
    .game-panel { margin-top: 30px; padding: 20px; width: 900px; }

    .timer-display { font-family: 'Fredoka'; font-size: 7rem; font-weight: 700; color: var(--snoopy-black); }
    .controls { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
    .btn { font-family: 'Fredoka'; font-weight: 600; border: none; border-radius: 15px; cursor: pointer; padding: 12px 25px; }
    .btn-primary { background: var(--accent-warm); color: white; }
    .btn-secondary { background: rgba(255,255,255,0.7); color: var(--dark-brown); }

    .settings-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
    .input-group { display: flex; flex-direction: column; align-items: center; }
    .input-group input { width: 60px; text-align: center; border-radius: 8px; border: 1px solid var(--soft-brown); background: rgba(255,255,255,0.5); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <audio id="rain-sound" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
  <audio id="fetty-sound" loop src="fetty.mp3"></audio>

  <div class="page">
    <h1 class="title-banner">Study with Snoopy</h1>

    <div class="timer-panel">
      <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="btn btn-secondary" id="rain-btn">🎵 Rain</button>
        <button class="btn btn-secondary" id="fetty-btn">🔥 Fetty</button>
      </div>

      <div id="mode-text" style="font-family:Handlee; font-size:1.5rem; margin-bottom:10px;">Work Time</div>

      <div class="settings-row" id="settings">
        <div class="input-group"><label>Work</label><input type="number" id="work-input" value="25"></div>
        <div class="input-group"><label>Break</label><input type="number" id="break-input" value="5"></div>
      </div>

      <div class="timer-display" id="timer-display">25:00</div>

      <div class="controls">
        <button class="btn btn-primary" id="start-btn">Start</button>
        <button class="btn btn-secondary" id="pause-btn">Pause</button>
        <button class="btn btn-secondary" id="reset-btn">Reset</button>
      </div>
      <button class="btn btn-secondary" style="margin-top:15px; width:100%;" id="skip-btn">⏭ Skip Block</button>
    </div>

    <div id="game-container" class="game-panel hidden">
      <iframe src="tetris.html" id="tetris-frame" frameborder="0" width="850" height="700"></iframe>
    </div>
  </div>

  <script>
    let timerInterval, totalSeconds, timeLeft, isWorkMode = true, isRunning = false;
    const display = document.getElementById('timer-display');
    const modeText = document.getElementById('mode-text');
    const workInput = document.getElementById('work-input');
    const breakInput = document.getElementById('break-input');
    const gameContainer = document.getElementById('game-container');
    const settingsContainer = document.getElementById('settings');

    function updateDisplay() {
      let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
      display.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function switchMode() {
        isWorkMode = !isWorkMode;
        const tetrisFrame = document.getElementById('tetris-frame');
        if (isWorkMode) {
            modeText.textContent = 'Work Time';
            totalSeconds = workInput.value * 60;
            gameContainer.classList.add('hidden');
            settingsContainer.classList.remove('hidden');
            tetrisFrame.src = "tetris.html"; // Reset for next break
        } else {
            modeText.textContent = 'Break Time!';
            totalSeconds = breakInput.value * 60;
            gameContainer.classList.remove('hidden');
            settingsContainer.classList.add('hidden');
        }
        timeLeft = totalSeconds;
        updateDisplay();
        startTimer();
    }

    function startTimer() {
      if (isRunning) return; isRunning = true;
      timerInterval = setInterval(() => {
        if (timeLeft > 0) { timeLeft--; updateDisplay(); } 
        else { clearInterval(timerInterval); isRunning = false; switchMode(); }
      }, 1000);
    }

    // Audio handlers
    document.getElementById('rain-btn').onclick = () => { 
        const a = document.getElementById('rain-sound'); 
        a.paused ? a.play() : a.pause(); 
    };
    document.getElementById('fetty-btn').onclick = () => { 
        const a = document.getElementById('fetty-sound'); 
        a.paused ? a.play() : a.pause(); 
    };

    document.getElementById('start-btn').onclick = startTimer;
    document.getElementById('pause-btn').onclick = () => { clearInterval(timerInterval); isRunning = false; };
    document.getElementById('reset-btn').onclick = () => { 
        clearInterval(timerInterval); isRunning = false; 
        timeLeft = workInput.value * 60; updateDisplay(); 
    };
    document.getElementById('skip-btn').onclick = switchMode;

    timeLeft = workInput.value * 60; totalSeconds = timeLeft;
    updateDisplay();
  </script>
</body>
</html>

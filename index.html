<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study with Snoopy — Pomodoro</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Handlee&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Snoopy-inspired warm palette */
      --cream: #fdf8f3;
      --warm-tan: #e8dcc8;
      --soft-brown: #a89080;
      --dark-brown: #5c4a42;
      --snoopy-black: #2b1f1a;
      --puppy-pink: #f4d4e6;
      --sky-blue: #b8d8e8;
      --soft-gold: #d4b896;
      --accent-warm: #d68a4a;
      --text-dark: #4a3a32;
      --panel-shadow: rgba(92, 74, 66, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-image: url('snoopy_lying_down_gif.gif');
      background-attachment: fixed;
      background-size: cover; 
      background-position: center;
      background-repeat: no-repeat;
      transition: background-color 0.5s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.15);
      z-index: 1;
      pointer-events: none;
    }

    /* === MAIN CONTENT === */
    .page {
      position: relative;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 180px;
      min-height: 100vh;
    }

    .title-banner {
      font-family: 'Handlee', cursive;
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      color: var(--snoopy-black);
      text-align: center;
      letter-spacing: 0.02em;
      margin-bottom: 12px;
      text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.6);
      position: relative;
      font-weight: 700;
    }

    .title-subtitle {
      font-size: 0.85rem;
      color: var(--soft-brown);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 28px;
      font-family: 'Fredoka', sans-serif;
    }

    /* === TIMER PANEL === */
    .timer-panel {
      /* Opacity set to 0.68 as requested */
      background: linear-gradient(135deg, rgba(253, 248, 243, 0.68) 0%, rgba(232, 220, 200, 0.68) 100%);
      border: 3px solid var(--soft-brown);
      border-radius: 24px;
      padding: 40px 48px 32px;
      box-shadow: 0 12px 48px var(--panel-shadow), 
                  0 0 0 1px rgba(255, 255, 255, 0.8) inset,
                  0 2px 0 rgba(0, 0, 0, 0.05) inset;
      text-align: center;
      width: min(480px, 95vw);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position: relative;
      animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .mode-label {
      font-family: 'Handlee', cursive;
      font-size: 1.5rem;
      color: var(--dark-brown);
      letter-spacing: 0.04em;
      margin-bottom: 18px;
      font-weight: 700;
    }

    .settings-row {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .input-group label {
      font-size: 0.75rem;
      color: var(--soft-brown);
      text-transform: uppercase;
      font-weight: 600;
    }

    .input-group input {
      width: 70px;
      padding: 8px 12px;
      border: 2px solid var(--soft-brown);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      text-align: center;
      font-weight: 600;
    }

    .timer-display {
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(5rem, 16vw, 8rem);
      color: var(--snoopy-black);
      margin: 12px 0 24px;
      font-weight: 700;
      text-shadow: 3px 3px 0 rgba(244, 212, 230, 0.5);
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }

    .btn {
      font-family: 'Fredoka', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 12px 28px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-warm), #e8954a);
      color: white;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.85);
      color: var(--dark-brown);
      border: 2px solid var(--soft-brown);
    }

    .btn-skip {
      background: rgba(244, 212, 230, 0.6);
      color: var(--dark-brown);
      border: 2px solid var(--puppy-pink);
    }

    /* === PROGRESS BAR === */
    .progress-track {
      width: 100%;
      height: 10px;
      background: rgba(168, 144, 128, 0.15);
      border-radius: 8px;
      margin-top: 20px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-warm), var(--soft-gold));
      width: 100%;
      transition: width 1s linear;
    }

    /* === GAME PANEL === */
    .game-panel {
      margin-top: 36px;
      background: linear-gradient(135deg, rgba(253, 248, 243, 0.75) 0%, rgba(232, 220, 200, 0.75) 100%);
      border: 3px solid var(--soft-brown);
      border-radius: 24px;
      padding: 24px;
      text-align: center;
      width: min(920px, 95vw);
      backdrop-filter: blur(10px);
    }

    .hidden { display: none !important; }

    /* Audio button specific style */
    #rain-btn {
      width: 100%;
      margin-bottom: 20px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <audio id="rain-sound" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <div class="page">
    <h1 class="title-banner">Study with Snoopy</h1>
    <p class="title-subtitle">Pomodoro Timer</p>

    <div class="timer-panel">
      <button class="btn btn-secondary" id="rain-btn">🎵 Play Rain Sounds</button>

      <div class="mode-label" id="mode-text">Work Time</div>

      <div class="settings-row" id="settings">
        <div class="input-group">
          <label for="work-input">Work (min)</label>
          <input type="number" id="work-input" value="25" min="1">
        </div>
        <div class="input-group">
          <label for="break-input">Break (min)</label>
          <input type="number" id="break-input" value="5" min="1">
        </div>
      </div>

      <div class="timer-display" id="timer-display">25:00</div>

      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="start-btn">Start</button>
        <button class="btn btn-secondary" id="pause-btn">Pause</button>
        <button class="btn btn-secondary" id="reset-btn">Reset</button>
      </div>

      <div style="margin-top: 15px;">
        <button class="btn btn-skip" id="skip-btn">⏭ Skip Block</button>
      </div>
    </div>

    <div id="game-container" class="game-panel hidden">
      <h2 style="font-family: Handlee; margin-bottom: 10px;">Break Time!</h2>
      <iframe src="tetris.html" frameborder="0" width="800" height="850" id="tetris-frame"></iframe>
    </div>
  </div>

  <script>
    let timerInterval;
    let totalSeconds;
    let timeLeft;
    let isWorkMode = true;
    let isRunning = false;

    const timerDisplay = document.getElementById('timer-display');
    const modeText = document.getElementById('mode-text');
    const workInput = document.getElementById('work-input');
    const breakInput = document.getElementById('break-input');
    const startBtn = document.getElementById('start-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const resetBtn = document.getElementById('reset-btn');
    const skipBtn = document.getElementById('skip-btn');
    const gameContainer = document.getElementById('game-container');
    const progressFill = document.getElementById('progress-fill');
    const rainSound = document.getElementById('rain-sound');
    const rainBtn = document.getElementById('rain-btn');

    function init() {
      totalSeconds = workInput.value * 60;
      timeLeft = totalSeconds;
      updateDisplay();
    }

    function updateDisplay() {
      let m = Math.floor(timeLeft / 60);
      let s = timeLeft % 60;
      timerDisplay.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      const pct = totalSeconds > 0 ? (timeLeft / totalSeconds) * 100 : 0;
      progressFill.style.width = pct + '%';
    }

    function startTimer() {
      if (isRunning) return;
      isRunning = true;
      timerInterval = setInterval(() => {
        if (timeLeft > 0) {
          timeLeft--;
          updateDisplay();
        } else {
          clearInterval(timerInterval);
          isRunning = false;
          switchMode();
        }
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timerInterval);
      isRunning = false;
    }

    function resetTimer() {
      pauseTimer();
      timeLeft = isWorkMode ? workInput.value * 60 : breakInput.value * 60;
      totalSeconds = timeLeft;
      updateDisplay();
    }

    function switchMode() {
      isWorkMode = !isWorkMode;
      if (isWorkMode) {
        modeText.textContent = 'Work Time';
        totalSeconds = workInput.value * 60;
        gameContainer.classList.add('hidden');
      } else {
        modeText.textContent = 'Break Time!';
        totalSeconds = breakInput.value * 60;
        gameContainer.classList.remove('hidden');
      }
      timeLeft = totalSeconds;
      updateDisplay();
      startTimer();
    }

    // Audio Logic
    rainBtn.addEventListener('click', () => {
      if (rainSound.paused) {
        rainSound.play();
        rainBtn.textContent = '⏸ Pause Rain';
        rainBtn.style.background = 'var(--sky-blue)';
      } else {
        rainSound.pause();
        rainBtn.textContent = '🎵 Play Rain Sounds';
        rainBtn.style.background = 'rgba(255, 255, 255, 0.85)';
      }
    });

    startBtn.addEventListener('click', startTimer);
    pauseBtn.addEventListener('click', pauseTimer);
    resetBtn.addEventListener('click', resetTimer);
    skipBtn.addEventListener('click', switchMode);

    init();
  </script>
</body>
</html>
